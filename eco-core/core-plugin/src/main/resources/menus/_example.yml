# The ID of the menu is the name of the .yml file,
# for example help.yml has the ID of help
# You can place menus anywhere in this folder,
# including in subfolders if you want to organize your menu configs
# _example.yml is not loaded.

# The title of the GUI
title: "Example GUI"

# (Optional) The command to open the GUI, if not set, there will be no command.
command: examplemenu

# The size of the GUI, between 1 and 6
rows: 6

# Read https://plugins.auxilor.io/effects/configuring-a-condition
# The conditions required to open the GUI
conditions: [ ]

# The messages to send when the conditions are not met
cannot-open-messages:
  - "&cYou cannot open this menu!"

# Read https://plugins.auxilor.io/effects/configuring-an-effect
# Effects to run when the GUI is opened
open-effects: [ ]

# Effects to run when the GUI is closed
close-effects: [ ]

# Whether to automatically refresh (re-render) this menu for viewers.
# interval is in ticks (20 ticks = 1 second).
refresh:
  enabled: false
  interval: 20

# Options for the page arrows
# If on the first page, the backwards arrow will not be shown,
# and if on the last page, the forwards arrow will not be shown.
forwards-arrow:
  item: arrow name:"&fNext Page"
  enabled: true
  location:
    row: 6
    column: 8

backwards-arrow:
  item: arrow name:"&fPrevious Page"
  enabled: true
  location:
    row: 6
    column: 2

pages:
  - page: 1
    mask:
      # The way the mask works is by having a list of materials
      # And then a pattern to use those materials.

      # The pattern is the rows in the GUI
      # Each line must be 9 long, and the amount of rows should be the amount of rows in the GUI
      # A zero represents nothing
      # A 1 represents the first material
      # A 2 represents the second material
      # And so on, you can add up to 9.

      items:
        - gray_stained_glass_pane
        - black_stained_glass_pane
      pattern:
        - "211101112"
        - "211111112"
        - "210000012"
        - "210010012"
        - "211111112"
        - "211101112"
  - page: 2
    mask:
      items:
        - gray_stained_glass_pane
        - red_stained_glass_pane
      pattern:
        - "211101112"
        - "211111112"
        - "210000012"
        - "210010012"
        - "211111112"
        - "211101112"

slots:
  - item: barrier name:"&cClose" # Item lookup: https://plugins.auxilor.io/the-item-lookup-system
    lore: [ ] # (Optional) The lore of the slot item.
    location: # The location of the item in the GUI
      row: 6
      column: 5
      page: 1
      layer: 2 # (Optional) The layer of the item. Higher layers are rendered on top of lower layers, allowing you to have multiple items in the same slot and show/hide them based on conditions.
    conditions: [ ] # Conditions required for the item to show and be clickable - use this with layers to show items based on conditions!
    show-if-not-met: false # Whether to show the item if conditions are not met. If true, the item will show but be unclickable.
    left-click:
      - id: close_inventory
    right-click: []
    shift-left-click: []
    shift-right-click: []

  - item: player_head head:%player% name:"&f%player%"
    location:
      row: 1
      column: 5
      page: 1
    shift-right-click: # Effects when shift-right-clicking the item
      - id: open_menu
        args:
          menu: another_menu